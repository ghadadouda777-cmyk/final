<div class="min-h-screen bg-gray-50">
  <div class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
    <div class="px-4 py-6 sm:px-0">
      <h1 class="text-2xl font-semibold text-gray-900">Créer un événement</h1>
      <p class="mt-2 text-gray-600">Remplissez les informations pour créer votre événement</p>
      
      <div class="mt-8">
        <div class="bg-white shadow rounded-lg">
          <div class="px-4 py-5 sm:p-6">
            <form class="space-y-6">
              <div>
                <label class="block text-sm font-medium text-gray-700">Titre de l'événement</label>
                <input type="text" class="mt-1 block w-full border-gray-300 rounded-md" placeholder="Mon événement">
              </div>
              
              <div>
                <label class="block text-sm font-medium text-gray-700">Description</label>
                <textarea rows="4" class="mt-1 block w-full border-gray-300 rounded-md" placeholder="Décrivez votre événement..."></textarea>
              </div>
              
              <div class="flex justify-end">
                <button type="button" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700">
                  Créer l'événement
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
